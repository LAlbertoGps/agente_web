<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>Redgps</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    
  <script type="module" crossorigin src="/agente_web/assets/index-DeKvGVZf.js"></script>
  <link rel="stylesheet" crossorigin href="/agente_web/assets/index-ptbACotc.css">
</head>
<body >

    <!-- Pantalla de Inicio de Sesión -->
    <div id="login-screen">
        <div class="login-container">
            <div class="login-header">
                <h1><span class="red">Red</span><span class="gps">Gps</span> <span>Assistant</span></h1>
                <p>Configura tu sesión para comenzar</p>
            </div>
            <div class="form-group">
                <label for="login-username">Usuario</label>
                <input type="text" id="login-username" placeholder="Tu usuario de RedGPS">
            </div>
            <div class="form-group">
                <label for="login-password">Contraseña</label>
                <input type="password" id="login-password" placeholder="Tu contraseña">
            </div>
            <div class="form-group">
                <label for="login-gemini-key">Gemini API Key</label>
                <input type="password" id="login-gemini-key" placeholder="AIZA...">
            </div>
            <div class="form-group">
                <label for="login-openai-key">OpenAI API Key</label>
                <input type="password" id="login-openai-key" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label for="login-redgps-key">RedGPS API Key</label>
                <input type="password" id="login-redgps-key" placeholder="API Key de RedGPS">
            </div>
            <button id="login-submit" class="login-btn">
                <span>Comenzar Chat</span>
                <i data-lucide="arrow-right"></i>
            </button>
        </div>
    </div>

    <!--Header nuevo-->
    <header class="header-custom fix-t">
        <!--Logo-->
        <div class="hc-logo">
            <span class="red" style="color: var(--orange)">Red</span><span class="gps" style="color: var(--gray)">Gps</span>
            <span style="font-weight: 300; font-size: 0.9rem; margin-left: 5px; opacity: 0.7;">| Assistant</span>
        </div>

        <!-- Selector de IA -->
        <div class="engine-toggle">
            <button class="toggle-btn active-gemini" id="btn-gemini">
                <i data-lucide="sparkles"></i> Gemini
            </button>
            <button class="toggle-btn" id="btn-openai">
                <i data-lucide="zap"></i> OpenAI
            </button>
            <button class="toggle-btn" id="btn-hibrido">
                <i data-lucide="dna"></i> Híbrido
            </button>
        </div>

        <!-- Selector de Voz -->
        <div class="hc-voice-selector">
            <i data-lucide="mic" class="ic-orange" style="width: 14px; height: 14px; opacity: 0.7;"></i>
            <select id="voice-select">
                <option value="Kore" selected>Voz: Kore (Default)</option>
                <option value="Aoede">Voz: Aoede</option>
                <option value="Charon">Voz: Charon</option>
                <option value="Fenrir">Voz: Fenrir</option>
                <option value="Puck">Voz: Puck</option>
            </select>
        </div>
        <!---->
    </header>
    
    <div class="wrap-base scroll" id="ontask-contenedor" style="position: relative; background-color: #2d2f34;">
        <div class="main">
            <div id="chat-container">
                <!-- Mensaje de Bienvenida -->
                <div class="message ai">
                    <div class="avatar"><i data-lucide="bot" class="ic-white"></i>  </div>
                    <div class="bubble">
                        Bienvenido al asistente inteligente de <strong>RedGps</strong>. ¿Cómo puedo ayudarte hoy? 
                    </div>
                </div>
            </div>

    
            <div class="input-wrapper">
                <div class="input-area">
                    <button class="icon-btn mic-btn-wrap" id="mic-btn">
                        <span class="mic-wave-bar" style="--d:0"></span>
                        <span class="mic-wave-bar" style="--d:1"></span>
                        <i id="mic-icon" data-lucide="mic"  class="ic-orange"></i>
                        <span class="mic-wave-bar" style="--d:2"></span>
                        <span class="mic-wave-bar" style="--d:3"></span>
                    </button>
                    <textarea id="user-input" rows="1" placeholder="Escribe tu mensaje..."></textarea>
                    <button class="icon-btn send-btn" id="send-btn" style="color: var(--orange);">
                        <i data-lucide="send-horizontal" class="ic-orange"></i>
                    </button>
                </div>
                <p class="disclaimer">Sistema de soporte asistido por IA - RedGps</p>
            </div>

            <div id="global-token-counter" style="font-size: 12px; color: #888; text-align: center; margin-bottom: 10px; opacity: 0.8;">
                <span style="margin-right: 8px; font-weight: bold; color: #aaa;">SESIÓN:</span>
                <span><i data-lucide="chevron-up" class="ic-green" style="width: 12px; height: 12px;"></i> <strong id="global-token-in">0</strong> <span style="opacity: 0.7;">(<span id="global-cost-in">$0.000000</span>)</span></span> |
                <span><i data-lucide="chevron-down" class="ic-red" style="width: 12px; height: 12px;"></i> <strong id="global-token-out">0</strong> <span style="opacity: 0.7;">(<span id="global-cost-out">$0.000000</span>)</span></span> |
                <span> <i data-lucide="activity" class="ic-white" style="width: 12px; height: 12px;"></i> <strong id="global-token-total">0</strong> <span style="font-weight:bold;">(<span id="global-cost-total">$0.000000</span>)</span></span>
            </div>
        </div>
    </div>


</body>
</html>
